<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>嘶好冷 ❄</title>
<style>
  :root {
    --bg: #F2F6FA;
    --card: #FFFFFF;
    --text: #3D4A5C;
    --btn: #8ECAE6;
    --btn-hover: #6BB3D9;
    --title: #AED4E6;
    --sub: #8FA4B8;
    --border: #D6E4F0;
    --shadow: 0 8px 32px rgba(142, 202, 230, 0.18);
    --radius: 22px;
    --radius-sm: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei UI", sans-serif;
    background: var(--bg);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse 600px 400px at 20% 20%, rgba(142,202,230,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 500px 350px at 80% 80%, rgba(174,212,230,0.10) 0%, transparent 70%);
  }

  /* ====== 雪花飘落 ====== */
  .snowflakes {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }
  .snowflake {
    position: absolute; top: -40px;
    color: #C8DFF0; font-size: 18px;
    animation: fall linear infinite;
    opacity: 0.6;
  }
  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(100vh) rotate(360deg); }
  }

  /* ====== 主容器 ====== */
  .container {
    position: relative; z-index: 1;
    width: 90vw; max-width: 480px;
    padding: 36px 28px 28px;
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow), 0 0 0 1px var(--border);
    text-align: center;
    animation: fadeUp 0.6s cubic-bezier(.16,1,.3,1);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ====== 标题 ====== */
  .header {
    display: inline-flex; align-items: center; gap: 8px;
    margin-bottom: 28px;
  }
  .header .icon {
    width: 40px; height: 40px;
    background: var(--title); border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: #fff;
  }
  .header h1 {
    font-size: 22px; font-weight: 700;
    color: #4A6B82; letter-spacing: 4px;
  }

  /* ====== 笑话卡片 ====== */
  .joke-card {
    background: #F8FAFC;
    border-radius: var(--radius-sm);
    padding: 30px 24px;
    margin-bottom: 22px;
    min-height: 120px;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center;
    position: relative;
    transition: all 0.3s ease;
  }
  .joke-category {
    display: inline-block;
    background: var(--title);
    color: #5A8299; font-size: 11px; font-weight: 600;
    padding: 4px 14px; border-radius: 20px;
    margin-bottom: 14px;
    letter-spacing: 1px;
  }
  .joke-content {
    font-size: 16px; line-height: 1.8;
    color: var(--text);
    word-break: break-word;
    transition: opacity 0.25s;
  }
  .joke-content.loading {
    opacity: 0.4;
  }
  .loader {
    font-size: 36px; animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 0.35; transform: scale(1); }
    50%     { opacity: 1;    transform: scale(1.1); }
  }

  /* ====== 按钮 ====== */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 14px 40px;
    background: var(--btn); border: none; border-radius: 50px;
    color: #fff; font-size: 16px; font-weight: 700;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.25s ease;
    box-shadow: 0 4px 16px rgba(142,202,230,0.35);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .btn:hover { background: var(--btn-hover); transform: translateY(-2px); box-shadow: 0 6px 22px rgba(142,202,230,0.45); }
  .btn:active { transform: scale(0.96); }

  /* ====== 底部 ====== */
  .footer {
    margin-top: 20px; font-size: 11px; color: var(--sub);
    letter-spacing: 1px;
  }

  /* ====== 移动端 ====== */
  @media (max-width: 480px) {
    .container { padding: 28px 20px 22px; width: 94vw; border-radius: 20px; }
    .header h1 { font-size: 19px; letter-spacing: 3px; }
    .header .icon { width: 34px; height: 34px; font-size: 18px; border-radius: 12px; }
    .joke-card { padding: 24px 18px; border-radius: 12px; }
    .joke-content { font-size: 15px; }
    .btn { padding: 13px 32px; font-size: 15px; }
    .snowflake { font-size: 14px; }
  }
</style>
</head>
<body>

<!-- 雪花 -->
<div class="snowflakes" id="snowflakes"></div>

<!-- 主容器 -->
<div class="container">
  <div class="header">
    <div class="icon">❄</div>
    <h1>嘶 好 冷</h1>
  </div>

  <div class="joke-card" id="jokeCard">
    <div class="loader" id="loader">❄</div>
    <div class="joke-category" id="jokeCategory" style="display:none"></div>
    <div class="joke-content" id="jokeContent"></div>
  </div>

  <button class="btn" id="newBtn" onclick="fetchJoke()">
    <span>🌸</span> 再来一条
  </button>

  <div class="footer">— 每日一冷 · 降温必备 —</div>
</div>

<script>
const API = 'http://8.134.62.33:8000/api/joke/random';

// ====== 雪花 ======
(function createSnow() {
  const box = document.getElementById('snowflakes');
  const chars = ['❄','❅','❆','✦','✧','•'];
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('span');
    el.className = 'snowflake';
    el.textContent = chars[Math.floor(Math.random() * chars.length)];
    el.style.left = Math.random() * 100 + '%';
    el.style.animationDuration = (8 + Math.random() * 14) + 's';
    el.style.animationDelay = Math.random() * 10 + 's';
    el.style.fontSize = (10 + Math.random() * 18) + 'px';
    el.style.opacity = 0.3 + Math.random() * 0.4;
    box.appendChild(el);
  }
})();

// ====== 获取笑话 ======
const loader = document.getElementById('loader');
const category = document.getElementById('jokeCategory');
const content = document.getElementById('jokeContent');

function fetchJoke() {
  content.classList.add('loading');
  content.textContent = '';
  category.style.display = 'none';
  loader.style.display = 'block';

  fetch(API)
    .then(r => r.json())
    .then(data => {
      loader.style.display = 'none';
      content.classList.remove('loading');
      if (data.category) {
        category.style.display = 'inline-block';
        category.textContent = '「' + data.category + '」';
      }
      content.textContent = data.content || '暂时没有笑话啦～';
    })
    .catch(() => {
      loader.style.display = 'none';
      content.classList.remove('loading');
      category.style.display = 'none';
      content.textContent = '网络开小差了～再试一次吧 ❄';
    });
}

fetchJoke();
</script>

</body>
</html>
